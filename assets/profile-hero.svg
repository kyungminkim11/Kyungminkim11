<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Kyungmin Kim — Lava Labs</title>
  <desc id="desc">Animated profile banner for a developer, creative technologist, and photographer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060816"/>
      <stop offset="45%" stop-color="#101632"/>
      <stop offset="100%" stop-color="#210d24"/>
    </linearGradient>
    <radialGradient id="lava" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ff3d54" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff3d54" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="42"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="1200" height="420" rx="32"/></clipPath>
    <style>
      .orb-a{animation:floatA 8s ease-in-out infinite alternate;transform-origin:center}
      .orb-b{animation:floatB 10s ease-in-out infinite alternate;transform-origin:center}
      .pulse{animation:pulse 3.4s ease-in-out infinite;transform-origin:center}
      .scan{animation:scan 5s linear infinite}
      .fade1{animation:fade 6s ease-in-out infinite}
      .fade2{animation:fade 6s ease-in-out infinite 2s}
      .fade3{animation:fade 6s ease-in-out infinite 4s}
      @keyframes floatA{to{transform:translate(90px,-32px) scale(1.12)}}
      @keyframes floatB{to{transform:translate(-80px,36px) scale(.88)}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
      @keyframes scan{from{transform:translateX(-480px)}to{transform:translateX(1280px)}}
      @keyframes fade{0%,20%,100%{opacity:.18}45%,70%{opacity:1}}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1200" height="420" fill="url(#bg)"/>
    <g opacity="0.24">
      <path d="M0 75H1200M0 150H1200M0 225H1200M0 300H1200M0 375H1200" stroke="#94a3b8" stroke-opacity=".12"/>
      <path d="M100 0V420M250 0V420M400 0V420M550 0V420M700 0V420M850 0V420M1000 0V420M1150 0V420" stroke="#94a3b8" stroke-opacity=".08"/>
    </g>
    <circle class="orb-a" cx="170" cy="330" r="220" fill="url(#lava)" filter="url(#blur)"/>
    <circle class="orb-b" cx="1040" cy="80" r="260" fill="url(#violet)" filter="url(#blur)"/>
    <rect x="-420" y="0" width="420" height="420" fill="url(#line)" opacity=".22" class="scan"/>
    <g transform="translate(82 72)">
      <rect width="78" height="78" rx="22" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".16"/>
      <path class="pulse" d="M39 14c9 11 17 20 17 32 0 11-8 20-17 20S22 57 22 46c0-10 6-18 12-26 2 8 8 12 5 22 8-4 10-15 0-28z" fill="#ff6b35" filter="url(#glow)"/>
    </g>
    <text x="82" y="205" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="60" font-weight="800" letter-spacing="-2">KYUNGMIN KIM</text>
    <text x="84" y="252" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="500">Developer · Creative Technologist · Photographer</text>
    <g transform="translate(84 296)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">
      <rect width="154" height="42" rx="21" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".14"/>
      <text x="24" y="27" fill="#f8fafc">LAVA LABS</text>
      <circle cx="132" cy="21" r="5" fill="#ff6b35" class="fade1"/>
      <rect x="170" width="176" height="42" rx="21" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".12"/>
      <text x="194" y="27" fill="#e2e8f0">WEB · AUTOMATION</text>
      <circle cx="326" cy="21" r="5" fill="#8b5cf6" class="fade2"/>
      <rect x="362" width="150" height="42" rx="21" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".12"/>
      <text x="388" y="27" fill="#e2e8f0">PHOTO · DESIGN</text>
      <circle cx="492" cy="21" r="5" fill="#38bdf8" class="fade3"/>
    </g>
    <text x="1118" y="368" text-anchor="end" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15">BUILDING USEFUL DIGITAL EXPERIENCES</text>
  </g>
</svg>