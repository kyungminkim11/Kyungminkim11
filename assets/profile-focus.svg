<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Kyungmin Kim focus areas</title>
  <desc id="desc">Product development, automation, and photography presented as mobile-friendly visual cards.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b18"/>
      <stop offset="0.52" stop-color="#10152a"/>
      <stop offset="1" stop-color="#180f24"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff4f45"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="15" stdDeviation="18" flood-color="#000" flood-opacity=".3"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="1200" height="600" rx="32"/></clipPath>
    <style>
      .dot{animation:pulse 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .flow{stroke-dasharray:10 15;animation:dash 7s linear infinite}
      .soft{animation:softGlow 4s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes dash{to{stroke-dashoffset:-125}}
      @keyframes softGlow{0%,100%{opacity:.72}50%{opacity:1}}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1200" height="600" fill="url(#panel)"/>
    <circle cx="40" cy="570" r="300" fill="#ff5a36" opacity=".075" filter="url(#glow)"/>
    <circle cx="1160" cy="20" r="310" fill="#8b5cf6" opacity=".075" filter="url(#glow)"/>
    <path class="flow" d="M112 70H1088" stroke="#ffffff" stroke-opacity=".11" stroke-width="2"/>
    <circle class="dot" cx="112" cy="70" r="6" fill="#ff6b35"/>
    <circle class="dot" cx="600" cy="70" r="6" fill="#8b5cf6" style="animation-delay:.9s"/>
    <circle class="dot" cx="1088" cy="70" r="6" fill="#38bdf8" style="animation-delay:1.8s"/>

    <g transform="translate(70 112)" filter="url(#shadow)">
      <rect width="1060" height="126" rx="25" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <rect class="soft" x="24" y="25" width="76" height="76" rx="22" fill="url(#orange)"/>
      <path d="M46 63h32M62 47v32" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <text x="130" y="49" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="800">PRODUCT &amp; WEB</text>
      <text x="130" y="84" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Useful services, thoughtful interfaces, reliable delivery.</text>
      <text x="1018" y="69" text-anchor="end" fill="#ff8a3d" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">UX · FRONTEND · PRODUCT</text>
    </g>

    <g transform="translate(70 262)" filter="url(#shadow)">
      <rect width="1060" height="126" rx="25" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <rect class="soft" x="24" y="25" width="76" height="76" rx="22" fill="url(#purple)" style="animation-delay:.7s"/>
      <path d="M44 76l13-21 12 13 13-20" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="130" y="49" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="800">AUTOMATION &amp; SYSTEMS</text>
      <text x="130" y="84" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Less repetition, clearer workflows, practical operations.</text>
      <text x="1018" y="69" text-anchor="end" fill="#a78bfa" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">AI · DATA · WORKFLOW</text>
    </g>

    <g transform="translate(70 412)" filter="url(#shadow)">
      <rect width="1060" height="126" rx="25" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <rect class="soft" x="24" y="25" width="76" height="76" rx="22" fill="url(#blue)" style="animation-delay:1.4s"/>
      <rect x="44" y="48" width="38" height="30" rx="7" fill="none" stroke="#fff" stroke-width="4"/>
      <circle cx="63" cy="63" r="8" fill="none" stroke="#fff" stroke-width="4"/>
      <text x="130" y="49" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="800">PHOTO &amp; BRAND</text>
      <text x="130" y="84" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Atmosphere, identity, visual stories, digital content.</text>
      <text x="1018" y="69" text-anchor="end" fill="#38bdf8" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">PHOTO · CONTENT · DESIGN</text>
    </g>
  </g>
</svg>