<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Kyungmin Kim focus areas</title>
  <desc id="desc">Product development, automation, and photography presented as responsive visual cards.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d1c"/>
      <stop offset="0.5" stop-color="#11152a"/>
      <stop offset="1" stop-color="#180f24"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff4f45"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".28"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="1200" height="280" rx="30"/></clipPath>
    <style>
      .dot{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}
      .flow{stroke-dasharray:10 14;animation:dash 7s linear infinite}
      .card{animation:rise 7s ease-in-out infinite}
      .c2{animation-delay:.7s}.c3{animation-delay:1.4s}
      @keyframes pulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.25)}}
      @keyframes dash{to{stroke-dashoffset:-120}}
      @keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1200" height="280" fill="url(#panel)"/>
    <circle cx="90" cy="240" r="190" fill="#ff5a36" opacity=".08" filter="url(#glow)"/>
    <circle cx="1110" cy="30" r="210" fill="#8b5cf6" opacity=".08" filter="url(#glow)"/>
    <path class="flow" d="M112 62H1088" stroke="#ffffff" stroke-opacity=".10" stroke-width="2"/>
    <circle class="dot" cx="112" cy="62" r="5" fill="#ff6b35"/>
    <circle class="dot" cx="600" cy="62" r="5" fill="#8b5cf6" style="animation-delay:.9s"/>
    <circle class="dot" cx="1088" cy="62" r="5" fill="#38bdf8" style="animation-delay:1.8s"/>

    <g class="card" transform="translate(58 92)" filter="url(#shadow)">
      <rect width="336" height="138" rx="24" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="url(#orange)"/>
      <path d="M38 49h20M48 39v20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text x="92" y="45" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">PRODUCT &amp; WEB</text>
      <text x="92" y="72" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Useful services, thoughtful interfaces</text>
      <text x="22" y="110" fill="#dbe4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Strategy · UX · Frontend · Deployment</text>
    </g>

    <g class="card c2" transform="translate(432 92)" filter="url(#shadow)">
      <rect width="336" height="138" rx="24" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="url(#purple)"/>
      <path d="M38 54l8-12 7 8 7-10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="45" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">AUTOMATION</text>
      <text x="92" y="72" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Less repetition, clearer operations</text>
      <text x="22" y="110" fill="#dbe4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">AI Tools · Workflow · Data · Systems</text>
    </g>

    <g class="card c3" transform="translate(806 92)" filter="url(#shadow)">
      <rect width="336" height="138" rx="24" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".12"/>
      <rect x="22" y="22" width="52" height="52" rx="16" fill="url(#blue)"/>
      <rect x="35" y="39" width="27" height="21" rx="5" fill="none" stroke="#fff" stroke-width="3"/>
      <circle cx="48.5" cy="49.5" r="5" fill="none" stroke="#fff" stroke-width="3"/>
      <text x="92" y="45" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">PHOTO &amp; BRAND</text>
      <text x="92" y="72" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Atmosphere, identity, visual stories</text>
      <text x="22" y="110" fill="#dbe4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Photography · Content · Visual Design</text>
    </g>
  </g>
</svg>